    image: thisisarpanghosh/garmin-fetch-data:latest
    container_name: garmin-fetcher
    restart: unless-stopped
    networks:
      - umbrel_main_network
    environment:
      - GARMINCONNECT_EMAIL=joel-weiss@outlook.de
      - GARMINCONNECT_BASE64_PASSWORD=a2lQZGV3d2FxemEya2FkamVm
      - GARMINCONNECT_IS_CN=False
      # This hostname only works because we are on the umbrel_main_network
      - INFLUXDB_HOST=influxdb_influxdb_1
      - INFLUXDB_PORT=8086
      - INFLUXDB_USERNAME=admin
      - INFLUXDB_PASSWORD=b347c61701b1ac6f32e1fd5f1bcad4deba95c6040f1cf068c5d5044410b70618
