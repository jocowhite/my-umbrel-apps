version: "3.7"

services:
  garmin-fetcher:
    image: thisisarpanghosh/garmin-fetch-data:latest
    container_name: my-store-garmin-fetcher
    restart: unless-stopped
    networks:
      - umbrel_main_network
    environment:
      - GARMINCONNECT_EMAIL=replace-me@example.com
      - GARMINCONNECT_BASE64_PASSWORD=replace-with-your-base64-password
      - GARMINCONNECT_IS_CN=False
      - INFLUXDB_HOST=influxdb_influxdb_1
      - INFLUXDB_PORT=8086
      - INFLUXDB_USERNAME=admin
      - INFLUXDB_PASSWORD=replace-with-your-umbrel-influxdb-password
      - INFLUXDB_DATABASE=GarminStats
      # Optional tuning values from the upstream project:
      # - UPDATE_INTERVAL_SECONDS=300
      # - LOG_LEVEL=INFO
      # - FETCH_SELECTION=daily_avg,sleep,steps,heartrate,stress,breathing,hrv,vo2,activity,race_prediction,body_composition
      # - USER_TIMEZONE=Europe/Berlin
    volumes:
      - ${APP_DATA_DIR}/garminconnect:/home/appuser/.garminconnect

networks:
  umbrel_main_network:
    external: true
