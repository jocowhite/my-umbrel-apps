manifestVersion: 1
id: my-store-garmin-fetcher
category: health
name: Garmin Fetcher
version: "1.0.0"
tagline: Syncs Garmin health data to your Umbrel's InfluxDB
description: >-
  Runs the Garmin sync worker as an Umbrel-managed app so it starts
  automatically with Umbrel and keeps writing Garmin metrics into your existing
  Umbrel InfluxDB instance.


  This package is intentionally scoped to the fetcher only. It assumes you
  already use Umbrel's InfluxDB and Grafana apps for storage and dashboards.
developer: Arpan Ghosh
website: https://github.com/arpanghosh8453/garmin-grafana
submitter: jocowhite
submission: https://github.com/jocowhite/my-umbrel-apps
repo: https://github.com/arpanghosh8453/garmin-grafana
support: https://github.com/arpanghosh8453/garmin-grafana/issues
icon: https://raw.githubusercontent.com/arpanghosh8453/garmin-grafana/master/Extra/icon.png
gallery: []
releaseNotes: ""
dependencies:
  - influxdb
  - grafana
path: ""
defaultUsername: ""
defaultPassword: ""
